<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<link rel="styleSheet" href="styleSheet.css">
</head>
<body>
    <button id="randomButton">Click Me</button>
    <div id="achievements-panel"></div>
    <div class="container"> 
        <h2 id="cookie"></h2>
        <p id="MPS"> MPS: 0 </p>
        <p id="MPC"> MPC: 0</p>
        <div class="buttons">
            <img src="cookie_fully_transparent.webp" alt="COOKIE" onclick="plusplus()" style="cursor: pointer; width: 200px;
            height: 200px; margin: auto;">
            <button onclick="upgrade('1')" id="Upg1"> upgrade 1 </button>
            <button onclick="upgrade('2')" id="Upg2"> upgrade 2 </button>
            <button onclick="clickUpg('1')" id="clickUpg1"> click upgrade 1 </button>
            <button onclick="clickUpg('2')" id="clickUpg2"> click upgrade 2 </button>
            <button onclick="savegame()" id="Save"> Save the game </button>
            <button onclick="exitgame()" id="Exit"> Exit the game </button>
            <button id="Reset"> Reset progress </button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
